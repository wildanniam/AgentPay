name: AgentPay CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/agentpay?schema=public"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/agentpay?schema=public"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      STELLAR_NETWORK: "stellar:testnet"
      STELLAR_RPC_URL: "https://soroban-testnet.stellar.org"
      X402_FACILITATOR_URL: "https://www.x402.org/facilitator"
      NEXT_PUBLIC_STELLAR_HORIZON_URL: "https://horizon-testnet.stellar.org"
      NEXT_PUBLIC_STELLAR_RPC_URL: "https://soroban-testnet.stellar.org"
      NEXT_PUBLIC_STELLAR_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
      NEXT_PUBLIC_STELLAR_READINESS_RECIPIENT_PUBLIC_KEY: "GAVJ6P6SV5GSC7BFZY6IQSJNUYKBIA3AN4DCUURJ3Q6BMWCGQL4LUNWG"
      NEXT_PUBLIC_STELLAR_READINESS_PING_AMOUNT: "0.00001"

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: agentpay
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build web app
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Contract tests
        run: cargo test --manifest-path contracts/agentpay_registry/Cargo.toml

      - name: Contract wasm build
        run: cargo build --manifest-path contracts/agentpay_registry/Cargo.toml --target wasm32v1-none --release
